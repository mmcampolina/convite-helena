<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>1 Aninho da Helena Coimbra Alves 🍎</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#b03025;--gold:#c9973a;--blue:#1d4f7c;
  --cream:#fdf6ee;--dark:#1a0808;--pink:#fce8ec;--white:#fff;
}
html{scroll-behavior:smooth;}
body{font-family:'Cormorant Garamond',serif;background:#0a0008;color:var(--dark);overflow-x:hidden;}

/* ── SNOW ── */
#snow{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.flake{position:absolute;top:-20px;animation:fall linear infinite;opacity:.7;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);}100%{transform:translateY(105vh) rotate(360deg);}}

/* ══════════════════ SECTIONS ══════════════════ */
.hero{
  min-height:100vh;width:100%;
  background:linear-gradient(160deg,#0d0005 0%,#1a0610 40%,#2a0e1a 70%,#0d0320 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:40px 20px;text-align:center;
}
.hero-name{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(4em,14vw,9em);
  color:#fff;line-height:1;
  text-shadow:0 0 60px rgba(201,151,58,.5),3px 3px 12px rgba(0,0,0,.5);
  margin-bottom:10px;
}
.hero-badge{
  display:inline-block;background:linear-gradient(135deg,var(--red),#8b1a12);
  color:#fff;font-size:1em;font-weight:600;letter-spacing:4px;
  text-transform:uppercase;padding:10px 36px;border-radius:50px;
  box-shadow:0 6px 24px rgba(176,48,37,.5);margin-bottom:30px;
}
.hero-parents{color:rgba(255,255,255,.55);font-size:1.05em;letter-spacing:1px;margin-bottom:40px;line-height:1.8;}
.hero-parents span{color:rgba(255,255,255,.85);font-style:italic;}

/* ══════════════════ RSVP ══════════════════ */
.rsvp-section{
  min-height:100vh;width:100%;
  background:linear-gradient(160deg,#1a0408 0%,#2a0e1a 60%,#0d1f35 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 20px;text-align:center;color:#fff;
}
.rsvp-box{
  max-width:560px;width:100%;
  background:rgba(255,255,255,.06);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);border-radius:28px;
  padding:44px 40px;margin-top:36px;
}
.form-group{margin-bottom:22px;text-align:left;}
.form-label{display:block;font-size:.8em;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.form-input,.form-select{
  width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.1em;
  padding:14px 18px;border-radius:12px;outline:none;
}
.rsvp-btn{
  width:100%;padding:18px;margin-top:10px;
  background:linear-gradient(135deg,var(--gold),#a07020);
  border:none;border-radius:14px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-size:1.3em;font-weight:600;
  color:#fff;letter-spacing:2px;
}
.rsvp-success{
  display:none;padding:25px;border-radius:14px;
  background:rgba(40,160,80,0.15);border:1px solid rgba(40,160,80,0.4);
  color:#7effa8;font-size:1.2em;margin-top:16px;line-height:1.5;
}

footer{
  width:100%;background:#050002;
  padding:44px 20px;text-align:center;color:rgba(255,255,255,.5);
}
.footer-script{font-family:'Pinyon Script',cursive;font-size:3em;color:var(--gold);margin-bottom:12px;display:block;}
</style>
</head>
<body>

<div id="snow"></div>

<section class="hero">
  <div class="hero-name">Helena</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.2em;color:rgba(255,255,255,.5);letter-spacing:3px;margin-bottom:18px;">Coimbra Alves</div>
  <div class="hero-badge">✨ 30 de Maio de 2026 ✨</div>
  <div class="hero-parents">Com todo o amor de<br/><span>Raquel Coimbra</span> &amp; <span>Gustavo Neto</span></div>
</section>

<section class="rsvp-section">
  <div class="section-title">Você vem?</div>
  <div class="rsvp-box">
    
    <form action="https://api.staticforms.xyz/submit" method="POST" id="rsvp-form">
      <input type="hidden" name="accessKey" value="sf_fdcb738aed9c24d8496edc9e">

      <div class="form-group">
        <label class="form-label">SEU NOME</label>
        <input class="form-input" id="guest-name" type="text" name="name" placeholder="Digite seu nome completo" required/>
      </div>

      <div class="form-group">
        <label class="form-label">QUANTOS ADULTOS?</label>
        <input class="form-input" type="number" name="field1" placeholder="Ex: 2" required/>
      </div>

      <div class="form-group">
        <label class="form-label">QUANTAS CRIANÇAS?</label>
        <input class="form-input" type="number" name="field3" placeholder="Ex: 1"/>
      </div>

      <div class="form-group">
        <label class="form-label">CONFIRMAÇÃO</label>
        <select class="form-select" name="field2" required>
          <option value="">Selecione...</option>
          <option value="Sim">Vou com certeza!</option>
          <option value="Não">Infelizmente não poderei ir</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">RECADO</label>
        <textarea class="form-input" name="message" placeholder="Deixe um recadinho..."></textarea>
      </div>

      <button type="submit" class="rsvp-btn" id="submit-btn">💌 Confirmar Presença</button>
    </form>

    <div id="sucesso-msg" class="rsvp-success"></div>

  </div>
</section>

<footer>
  <span class="footer-script">Até lá… 🍎</span>
</footer>

<script>
/* ── SNOW ── */
const sc = document.getElementById('snow');
const fl = ['❄','❅','❆','·'];
for(let i=0;i<40;i++){
  const s=document.createElement('span');
  s.className='flake';
  s.textContent=fl[Math.floor(Math.random()*fl.length)];
  s.style.cssText=`left:${Math.random()*100}vw; font-size:${.8+Math.random()}em; animation-duration:${8+Math.random()*12}s; animation-delay:${-Math.random()*10}s; color:#fff; opacity:.6;`;
  sc.appendChild(s);
}

/* ── ENVIO DINÂMICO ── */
const form = document.getElementById('rsvp-form');
const msgSucesso = document.getElementById('sucesso-msg');
const btn = document.getElementById('submit-btn');

form.onsubmit = async (e) => {
  e.preventDefault();
  
  const nomeCompleto = document.getElementById('guest-name').value;
  const primeiroNome = nomeCompleto.split(' ')[0]; 
  
  btn.innerText = "Enviando...";
  btn.disabled = true;

  try {
    await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    
    msgSucesso.innerHTML = `🎉 Oba! <strong>${primeiroNome}</strong>, a Helena e a família estão te esperando! Até lá! 🍎 ✨`;
    form.style.display = 'none';
    msgSucesso.style.display = 'block';
  } catch (error) {
    btn.innerText = "Erro ao enviar. Tente novamente.";
    btn.disabled = false;
  }
};
</script>
</body>
</html>
